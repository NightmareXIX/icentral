version: '3.8'

services:
  # 1. React Frontend
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host"
    depends_on:
      - api-gateway

  # 2. API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - USER_SERVICE_URL=http://user-service:3001
      - POST_SERVICE_URL=http://post-service:3002
      - JOB_SERVICE_URL=http://job-service:3003
      - AUTH_SERVICE_URL=http://auth-service:3004
      - CHAT_SERVICE_URL=http://chat-service:3005
    depends_on:
      - user-service
      - post-service
      - job-service
      - auth-service
      - chat-service

  # 3. User Service
  user-service:
    build: ./services/user-service
    environment:
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - USER_SERVICE_SCHEMA=${USER_SERVICE_SCHEMA:-public}
      - JWT_SECRET=${JWT_SECRET:-HelloWorldKey}

  # 4. Post Service
  post-service:
    build: ./services/post-service
    environment:
      - PORT=3002
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DNS_RESULT_ORDER=ipv4first
      - PG_FORCE_IPV4=true
      - POST_SERVICE_SCHEMA=${POST_SERVICE_SCHEMA}
      - JWT_SECRET=${JWT_SECRET:-HelloWorldKey}
      - NEWSLETTER_SCHEDULE_ENABLED=${NEWSLETTER_SCHEDULE_ENABLED:-true}
      - NEWSLETTER_SCHEDULE_INTERVAL_MS=${NEWSLETTER_SCHEDULE_INTERVAL_MS:-3600000}
      - NEWSLETTER_TIMEZONE=${NEWSLETTER_TIMEZONE:-Asia/Dhaka}
      - NEWSLETTER_APP_BASE_URL=${NEWSLETTER_APP_BASE_URL:-http://localhost:5173}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-ICentral Academic Digest}

  # 5. Job Service
  job-service:
    build: ./services/job-service
    environment:
      - PORT=3003
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JOB_SERVICE_SCHEMA=${JOB_SERVICE_SCHEMA:-public}
      - JWT_SECRET=${JWT_SECRET:-HelloWorldKey}

  # 6. Auth Service
  auth-service:
    build: ./services/auth-service
    environment:
      - PORT=3004
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET:-HelloWorldKey}
      - CORS_ORIGIN=http://localhost:5173

  # 7. Chat Service (internal only, no public port)
  chat-service:
    build: ./services/chat-service
    environment:
      - PORT=3005
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DNS_RESULT_ORDER=ipv4first
      - PG_FORCE_IPV4=true
      - JWT_SECRET=${JWT_SECRET:-HelloWorldKey}
      - CORS_ORIGIN=http://localhost:5173,http://localhost:5000

volumes:
  frontend_node_modules:
